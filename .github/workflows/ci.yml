name: Wordcount Tests

on:
  push:
    branches: [ main ]
    paths:
      - '0-Warmup/**'
  pull_request:
    branches: [ main ]
    paths:
      - '0-Warmup/**'

jobs:
  build-and-test:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        working-directory: 0-Warmup
        run: pytest -v
